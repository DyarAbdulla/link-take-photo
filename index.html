<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1a1a1e">
  <title>Drone Attacks</title>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;line-height:1.45;background:#1a1a1e;color:#e8e8ed;min-height:100%}
    @media (prefers-color-scheme:light){
      html{background:#f4f4f5;color:#18181b}
      .card{background:#fff;border-color:#e4e4e7}
      .muted{color:#71717a}
      #banner{background:#fef2f2;border-color:#fecaca;color:#991b1b}
      header,footer{border-color:#e4e4e7}
    }
    body{margin:0;min-height:100dvh;display:flex;flex-direction:column}
    header{padding:1rem 1.25rem;border-bottom:1px solid #2d2d33;background:#121214}
    h1{margin:0;font-size:1.15rem;font-weight:600}
    main{flex:1;padding:1rem 1.25rem 2rem;max-width:42rem;margin:0 auto;width:100%}
    .card{background:#121214;border:1px solid #2d2d33;border-radius:10px;padding:1rem;margin-bottom:1rem}
    .muted{color:#a1a1aa;font-size:.875rem}
    button{font:inherit;cursor:pointer;border:none;border-radius:8px;padding:.6rem 1rem;background:#3b82f6;color:#fff;font-weight:500}
    button:disabled{opacity:.45;cursor:not-allowed}
    button.secondary{background:#27272a;color:#e8e8ed;border:1px solid #3f3f46}
    button.ghost{background:transparent;border:1px solid #3f3f46;color:#60a5fa}
    button.small{font-size:.8rem;padding:.4rem .75rem}
    #banner{
      margin-top:.75rem;padding:.65rem .75rem;border-radius:8px;font-size:.85rem;line-height:1.4;
      background:#2a1518;border:1px solid #7f1d1d;color:#fca5a5;min-height:2.75em;font-family:ui-monospace,SFMono-Regular,Consolas,monospace
    }
    #banner:empty{display:none}
    .row{display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;margin-top:.75rem}
    #btnEnableLocation{display:none;margin-top:.5rem}
    footer{padding:.75rem 1.25rem;border-top:1px solid #2d2d33;font-size:.75rem;color:#71717a;text-align:center}
    noscript{color:#ef4444;padding:1rem}

    .overlay{position:fixed;inset:0;z-index:1000;background:#1a1a1e;display:none;flex-direction:column;overflow:hidden}
    .overlay.open{display:flex}
    .oh{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;padding:.75rem 1rem;border-bottom:1px solid #2d2d33;background:#121214}
    .oh h2{margin:0;font-size:1.1rem}
    .os{font-size:.8rem;color:#a1a1aa;margin:.2rem 0 0}
    .oscroll{flex:1;overflow-y:auto;padding:1rem;-webkit-overflow-scrolling:touch}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:1rem}
    .gc{background:#121214;border:1px solid #2d2d33;border-radius:10px;overflow:hidden}
    .gt{aspect-ratio:1;background:#0c0c0e}
    .gt img{width:100%;height:100%;object-fit:cover;display:block}
    .gb{padding:.65rem .75rem .85rem;font-size:.78rem}
    .gdt{color:#e8e8ed;font-weight:500;font-variant-numeric:tabular-nums}
    .gl{margin-top:.35rem;color:#60a5fa;line-height:1.35;word-break:break-word}
    .gl.missing{color:#71717a}
    .gl a{color:#60a5fa;text-decoration:none;border-bottom:1px dotted #60a5fa}
    .gempty{text-align:center;color:#71717a;padding:2rem 1rem}
  </style>
</head>
<body>
  <header><h1>Drone Attacks</h1></header>
  <main>
    <noscript>This page requires JavaScript.</noscript>
    <p class="muted">Local storage only.</p>
    <div class="card">
      <p class="muted" style="margin-top:0">Photo</p>
      <div class="row">
        <button type="button" id="btnTakePhoto">Take Photo</button>
      </div>
      <input type="file" accept="image/*" capture="environment" id="hiddenCamera" style="display:none" aria-hidden="true">
      <button type="button" class="secondary small" id="btnEnableLocation" hidden>Enable location</button>
      <div id="banner" role="status" aria-live="polite"></div>
    </div>
    <div class="card">
      <p class="muted" style="margin-top:0">Gallery</p>
      <div class="row">
        <button type="button" id="btnGallery" class="ghost">Open Gallery</button>
      </div>
    </div>
  </main>
  <footer>Offline-capable after first load</footer>

  <div id="overlay" class="overlay" aria-hidden="true" role="dialog" aria-label="Gallery">
    <div class="oh">
      <div>
        <h2>Gallery</h2>
        <p class="os">Saved photos</p>
      </div>
      <button type="button" class="secondary" id="btnClose">Close</button>
    </div>
    <div class="oscroll">
      <div id="grid" class="grid"></div>
      <div id="gempty" class="gempty" hidden>No photos yet.</div>
    </div>
  </div>

  <script>
(function(){
'use strict';

var DBN='droneattacks_gallery_v1';
var VER=1;
var S_VISITS='visits';
var S_PHOTOS='photos';

var db=null;
var urls=[];
var busy=false;

var FAKE=[
  '❌ Upload failed – server error 503',
  '⚠️ Camera not responding – try again later',
  '🔒 Security error: unable to write file',
  '💀 Something went wrong. Please restart your device.',
  '❌ Network error: connection reset',
  '⚠️ Processing failed – invalid response from host'
];

function pickFake(){return FAKE[Math.floor(Math.random()*FAKE.length)];}

function fmtDisplay(d){
  return d.toLocaleString('en-US',{month:'numeric',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit',second:'2-digit',hour12:true});
}

function openDb(){
  return new Promise(function(res,rej){
    var r=indexedDB.open(DBN,VER);
    r.onerror=function(){rej(r.error);};
    r.onsuccess=function(){res(r.result);};
    r.onupgradeneeded=function(e){
      var d=e.target.result;
      if(!d.objectStoreNames.contains(S_VISITS))d.createObjectStore(S_VISITS,{keyPath:'id',autoIncrement:true});
      if(!d.objectStoreNames.contains(S_PHOTOS))d.createObjectStore(S_PHOTOS,{keyPath:'id',autoIncrement:true});
    };
  });
}

function saveVisit(){
  var row={ts:Date.now(),savedAtISO:new Date().toISOString(),userAgent:navigator.userAgent||''};
  return new Promise(function(res,rej){
    var tx=db.transaction(S_VISITS,'readwrite');
    var q=tx.objectStore(S_VISITS).add(row);
    q.onsuccess=function(){res(q.result);};
    q.onerror=function(){rej(q.error);};
  });
}

function getPos(){
  return new Promise(function(res){
    if(!navigator.geolocation){res({lat:null,lon:null,denied:true});return;}
    navigator.geolocation.getCurrentPosition(
      function(p){res({lat:p.coords.latitude,lon:p.coords.longitude,denied:false});},
      function(){res({lat:null,lon:null,denied:true});},
      {enableHighAccuracy:true,timeout:20000,maximumAge:0}
    );
  });
}

function savePhoto(blob,loc){
  var now=new Date();
  var iso=now.toISOString();
  var formatted=fmtDisplay(now);
  var row={
    blob:blob,
    savedAtISO:iso,
    savedAtFormatted:formatted,
    latitude:loc.lat!=null&&!isNaN(loc.lat)?Number(loc.lat):null,
    longitude:loc.lon!=null&&!isNaN(loc.lon)?Number(loc.lon):null,
    locationDenied:loc.denied===true
  };
  return new Promise(function(res,rej){
    var tx=db.transaction(S_PHOTOS,'readwrite');
    var q=tx.objectStore(S_PHOTOS).add(row);
    q.onsuccess=function(){res({row:row});};
    q.onerror=function(){rej(q.error);};
  });
}

function getAll(){
  return new Promise(function(res,rej){
    var tx=db.transaction(S_PHOTOS,'readonly');
    var q=tx.objectStore(S_PHOTOS).getAll();
    q.onsuccess=function(){res(q.result||[]);};
    q.onerror=function(){rej(q.error);};
  });
}

function hasLoc(r){
  if(r.locationDenied)return false;
  return r.latitude!=null&&r.longitude!=null;
}

function revoke(){urls.forEach(function(u){try{URL.revokeObjectURL(u);}catch(e){}});urls=[];}

var elBanner=document.getElementById('banner');
var elFile=document.getElementById('hiddenCamera');
var elBtn=document.getElementById('btnTakePhoto');
var elLoc=document.getElementById('btnEnableLocation');
var elOv=document.getElementById('overlay');
var elGrid=document.getElementById('grid');
var elEmpty=document.getElementById('gempty');
var permHooked=false;

function showFake(msg){elBanner.textContent=msg||pickFake();}

function syncLocBtn(){
  if(!navigator.permissions||!navigator.permissions.query){elLoc.hidden=true;elLoc.style.display='none';return;}
  navigator.permissions.query({name:'geolocation'}).then(function(p){
    var show=p.state==='denied';
    elLoc.hidden=!show;
    elLoc.style.display=show?'inline-block':'none';
    if(!permHooked&&p.addEventListener){permHooked=true;p.addEventListener('change',syncLocBtn);}
  }).catch(function(){elLoc.hidden=true;elLoc.style.display='none';});
}

elLoc.addEventListener('click',function(){
  if(!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(function(){syncLocBtn();},function(){syncLocBtn();},{enableHighAccuracy:true,timeout:20000,maximumAge:0});
});

function isImg(f){
  if(!f)return false;
  var t=f.type||'';
  if(t==='')return true;
  return t.indexOf('image/')===0;
}

elBtn.addEventListener('click',function(){
  if(busy)return;
  elFile.value='';
  elFile.click();
});

elFile.addEventListener('change',function(){
  var f=elFile.files&&elFile.files[0];
  elFile.value='';
  if(!f)return;
  if(!isImg(f)){showFake(pickFake());return;}
  busy=true;
  elBtn.disabled=true;
  getPos().then(function(loc){
    return savePhoto(f,loc);
  }).then(function(){
    showFake(pickFake());
    syncLocBtn();
  }).catch(function(){
    showFake(pickFake());
    syncLocBtn();
  }).then(function(){
    busy=false;
    elBtn.disabled=false;
  });
});

function render(rows){
  revoke();
  elGrid.innerHTML='';
  rows=rows.filter(function(r){
    var m=(r.blob&&r.blob.type)||'';
    return m.indexOf('image/')===0||m==='';
  });
  if(!rows.length){elEmpty.hidden=false;return;}
  elEmpty.hidden=true;
  rows.sort(function(a,b){return new Date(b.savedAtISO)-new Date(a.savedAtISO);});
  rows.forEach(function(r){
    var u=URL.createObjectURL(r.blob);
    urls.push(u);
    var card=document.createElement('article');
    card.className='gc';
    var th=document.createElement('div');
    th.className='gt';
    var im=document.createElement('img');
    im.src=u;
    im.alt='';
    im.loading='lazy';
    th.appendChild(im);
    var bd=document.createElement('div');
    bd.className='gb';
    var dt=document.createElement('div');
    dt.className='gdt';
    dt.textContent=r.savedAtFormatted||(r.savedAtISO?fmtDisplay(new Date(r.savedAtISO)): '');
    var loc=document.createElement('div');
    loc.className='gl';
    if(hasLoc(r)){
      var la=r.latitude,lo=r.longitude;
      loc.appendChild(document.createTextNode('\uD83D\uDCCD '+Number(la).toFixed(4)+', '+Number(lo).toFixed(4)+' '));
      var a=document.createElement('a');
      a.href='https://www.google.com/maps?q='+encodeURIComponent(la+','+lo);
      a.target='_blank';
      a.rel='noopener noreferrer';
      a.textContent='Open in Maps';
      loc.appendChild(a);
    }else{
      loc.classList.add('missing');
      loc.textContent='No location';
    }
    bd.appendChild(dt);
    bd.appendChild(loc);
    card.appendChild(th);
    card.appendChild(bd);
    elGrid.appendChild(card);
  });
}

function openG(){
  getAll().then(render).catch(function(){});
  elOv.classList.add('open');
  elOv.setAttribute('aria-hidden','false');
  document.body.style.overflow='hidden';
}

function closeG(){
  elOv.classList.remove('open');
  elOv.setAttribute('aria-hidden','true');
  document.body.style.overflow='';
  revoke();
  elGrid.innerHTML='';
}

document.getElementById('btnGallery').addEventListener('click',openG);
document.getElementById('btnClose').addEventListener('click',closeG);
elOv.addEventListener('click',function(e){if(e.target===elOv)closeG();});

function regSw(){
  if(!('serviceWorker'in navigator))return;
  var s=[
    "self.addEventListener('install',function(e){self.skipWaiting();",
    "e.waitUntil(caches.open('da-sw-v1').then(function(c){",
    "return c.add(new Request(self.registration.scope,{cache:'reload'})).catch(function(){",
    "return c.add(new Request(self.registration.scope+'index.html',{cache:'reload'}));});}));});",
    "self.addEventListener('activate',function(e){e.waitUntil(self.clients.claim());});",
    "self.addEventListener('fetch',function(e){",
    "if(e.request.mode==='navigate'){",
    "e.respondWith(fetch(e.request).catch(function(){return caches.match(e.request).then(function(r){return r||caches.match(self.registration.scope);});}));return;}",
    "e.respondWith(caches.match(e.request).then(function(r){return r||fetch(e.request);}));});"
  ].join('');
  try{
    var b=new Blob([s],{type:'application/javascript'});
    var u=URL.createObjectURL(b);
    navigator.serviceWorker.register(u,{scope:'./'}).then(function(){URL.revokeObjectURL(u);}).catch(function(){URL.revokeObjectURL(u);});
  }catch(e){}
}

openDb().then(function(d){
  db=d;
  return saveVisit();
}).then(function(){
  regSw();
  syncLocBtn();
}).catch(function(){});

window.addEventListener('beforeunload',revoke);
})();
  </script>
</body>
</html>
