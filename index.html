<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0a0e14">
  <title>Drone Attacks</title>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html{font-family:system-ui,-apple-system,"Segoe UI",Roboto,Ubuntu,sans-serif;line-height:1.45;background:#0a0e14;color:#e6edf3;min-height:100%}
    body{margin:0;min-height:100dvh;display:flex;flex-direction:column}
    header{padding:1rem 1.25rem;border-bottom:1px solid #21262d;background:#0d1117}
    h1{margin:0;font-size:1.15rem;font-weight:600;letter-spacing:-.02em}
    main{flex:1;padding:1rem 1.25rem 2rem;max-width:42rem;margin:0 auto;width:100%}
    .card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:1rem;margin-bottom:1rem}
    .muted{color:#8b949e;font-size:.875rem}
    button{font:inherit;cursor:pointer;border:none;border-radius:8px;padding:.6rem 1rem;background:#238636;color:#fff;font-weight:500}
    button:disabled{opacity:.45;cursor:not-allowed}
    button.secondary{background:#21262d;color:#e6edf3;border:1px solid #30363d}
    button.ghost{background:transparent;border:1px solid #30363d;color:#58a6ff}
    button.small{font-size:.8rem;padding:.4rem .75rem}
    #status{margin-top:.75rem;font-size:.9rem;color:#d29922;min-height:1.4em}
    #status.status-deceptive{color:#f85149}
    .row{display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;margin-top:.75rem}
    #btnEnableLocation{display:none;margin-top:.5rem}
    footer{padding:.75rem 1.25rem;border-top:1px solid #21262d;font-size:.75rem;color:#6e7681;text-align:center}
    noscript{color:#f85149;padding:1rem;display:block}

    .gal-overlay{
      position:fixed;inset:0;z-index:1000;background:#0d1117;
      display:none;flex-direction:column;overflow:hidden;
    }
    .gal-overlay.open{display:flex}
    .gal-topnav{
      display:flex;justify-content:space-around;align-items:center;
      padding:.65rem .5rem;border-bottom:1px solid #21262d;background:#161b22;
      font-size:.78rem;flex-shrink:0;gap:.25rem;flex-wrap:wrap;
    }
    .gal-topnav span{color:#8b949e;padding:.35rem .45rem;border-radius:6px;cursor:default}
    .gal-userbar{
      display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-bottom:1px solid #21262d;background:#0d1117;
    }
    .gal-avatar{
      width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#238636,#1f6feb);
      flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;color:#fff;
    }
    .gal-userlines{flex:1;min-width:0}
    .gal-username{font-weight:600;font-size:.95rem}
    .gal-userstamp{font-size:.8rem;color:#8b949e;margin-top:.15rem}
    .gal-close{margin-left:auto;background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:.45rem .75rem;border-radius:8px;font-size:.85rem}
    .gal-scroll{flex:1;overflow-y:auto;padding:1rem;-webkit-overflow-scrolling:touch}
    .gal-head{margin-bottom:1.25rem;border-bottom:1px solid #21262d;padding-bottom:1rem}
    .gal-head h2{margin:0;font-size:1.25rem;font-weight:600;color:#e6edf3}
    .gal-head .gal-sub{font-size:.85rem;color:#8b949e;margin:.35rem 0 0}
    .gal-grid{
      display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem;
    }
    @media (min-width:640px){ .gal-grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));} }
    .gal-card{
      background:#161b22;border:1px solid #30363d;border-radius:12px;overflow:hidden;
      display:flex;flex-direction:column;
    }
    .gal-thumb-wrap{
      position:relative;aspect-ratio:1;background:#010409;overflow:hidden;
    }
    .gal-thumb-wrap img,.gal-thumb-wrap video.gal-vthumb{
      width:100%;height:100%;object-fit:cover;display:block;
    }
    .gal-play{
      position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      pointer-events:none;background:linear-gradient(to top,rgba(0,0,0,.45),transparent 50%);
    }
    .gal-play span{
      width:48px;height:48px;border-radius:50%;background:rgba(0,0,0,.65);
      color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.25rem;
      border:2px solid rgba(255,255,255,.35);
    }
    .gal-dur{
      position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.75);color:#fff;
      font-size:.7rem;padding:.15rem .4rem;border-radius:4px;font-variant-numeric:tabular-nums;
    }
    .gal-cardbody{padding:.75rem .85rem .9rem;font-size:.8rem;flex:1;display:flex;flex-direction:column;gap:.4rem}
    .gal-card-dt{color:#e6edf3;font-weight:500;font-variant-numeric:tabular-nums;line-height:1.35}
    .gal-card-loc{color:#58a6ff;font-size:.78rem;line-height:1.4;word-break:break-word}
    .gal-card-loc.missing{color:#8b949e}
    .gal-card-loc a{color:#58a6ff;text-decoration:none;border-bottom:1px dotted #58a6ff}
    .gal-empty{padding:2rem 1rem;text-align:center;color:#8b949e;font-size:.9rem}
  </style>
</head>
<body>
  <header><h1>Drone Attacks</h1></header>
  <main>
    <noscript>JavaScript is required for IndexedDB, geolocation, and offline support.</noscript>
    <p class="muted">Experimental interface. May behave unexpectedly.</p>
    <div class="card">
      <p class="muted" style="margin-top:0">Photo</p>
      <div class="row">
        <button type="button" id="btnTakePhoto">Take Photo</button>
      </div>
      <input type="file" accept="image/*" capture id="cameraInput" style="display:none" aria-hidden="true">
      <button type="button" class="secondary small" id="btnEnableLocation" hidden>Enable location</button>
      <div id="status" role="status" aria-live="polite"></div>
    </div>
    <div class="card">
      <p class="muted" style="margin-top:0">Gallery</p>
      <div class="row">
        <button type="button" id="btnViewGallery" class="ghost">View Gallery</button>
      </div>
    </div>
  </main>
  <footer>Works offline after first visit</footer>

  <div id="galleryOverlay" class="gal-overlay" aria-hidden="true" role="dialog" aria-label="Gallery">
    <nav class="gal-topnav" aria-label="Navigation">
      <span>Home</span>
      <span>Search</span>
      <span>My</span>
      <span>Messages</span>
      <span>Settings</span>
    </nav>
    <div class="gal-userbar">
      <div class="gal-avatar">D</div>
      <div class="gal-userlines">
        <div class="gal-username">drone_guest</div>
        <div class="gal-userstamp" id="galUserStamp"></div>
      </div>
      <button type="button" class="gal-close" id="btnCloseGallery">Close</button>
    </div>
    <div class="gal-scroll">
      <div class="gal-head">
        <h2>Gallery</h2>
        <p class="gal-sub">Saved photos with date, time, and location</p>
      </div>
      <div id="galGrid" class="gal-grid"></div>
      <div id="galEmpty" class="gal-empty" hidden>No photos yet.</div>
    </div>
  </div>

  <script>
(function () {
  'use strict';

  var DB_NAME = 'droneattacks_v1';
  var DB_VERSION = 4;
  var STORE_VISITS = 'visits';
  var STORE_MEDIA = 'photos';

  var visitId = null;
  var db = null;
  var objectUrls = [];
  var busy = false;

  var DECEPTIVE_MESSAGES = [
    'Website error: unable to load.',
    '404 — camera not found.',
    '⚠️ Something went wrong. Please try again later.',
    'Nice try! This site only works on Mars.',
    'Connection reset by peer (just kidding).',
    'Error 418: I’m a teapot.',
    'Failed to fetch reality. Retry never.',
    'Buffer overflow in the pigeon network.'
  ];

  function pickDeceptiveMessage() {
    return DECEPTIVE_MESSAGES[Math.floor(Math.random() * DECEPTIVE_MESSAGES.length)];
  }

  function openDb() {
    return new Promise(function (resolve, reject) {
      var req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onerror = function () { reject(req.error); };
      req.onsuccess = function () { resolve(req.result); };
      req.onupgradeneeded = function (e) {
        var d = e.target.result;
        var old = e.oldVersion;
        if (!d.objectStoreNames.contains(STORE_VISITS)) {
          d.createObjectStore(STORE_VISITS, { keyPath: 'id', autoIncrement: true });
        }
        if (!d.objectStoreNames.contains(STORE_MEDIA)) {
          d.createObjectStore(STORE_MEDIA, { keyPath: 'id', autoIncrement: true });
        }
        if (old < 4) {}
      };
    });
  }

  function saveVisit() {
    var rec = {
      timestamp: Date.now(),
      userAgent: navigator.userAgent,
      screenResolution: screen.width + 'x' + screen.height,
      captureMethod: 'file_input'
    };
    return new Promise(function (resolve, reject) {
      var tx = db.transaction(STORE_VISITS, 'readwrite');
      var store = tx.objectStore(STORE_VISITS);
      var req = store.add(rec);
      req.onsuccess = function () {
        visitId = req.result;
        resolve(visitId);
      };
      req.onerror = function () { reject(req.error); };
    });
  }

  function saveMediaBlob(blob, meta) {
    var savedAt = new Date().toISOString();
    var lat = meta.latitude != null && !isNaN(meta.latitude) ? Number(meta.latitude) : null;
    var lon = meta.longitude != null && !isNaN(meta.longitude) ? Number(meta.longitude) : null;
    var locationDenied = meta.locationDenied === true;
    var row = {
      blob: blob,
      savedAt: savedAt,
      kind: meta.kind || 'photo',
      mimeType: meta.mimeType || blob.type || 'image/jpeg',
      durationSec: meta.durationSec != null ? meta.durationSec : null,
      latitude: lat,
      longitude: lon,
      locationDenied: locationDenied,
      address: null,
      hasLocation: !locationDenied && lat != null && lon != null
    };
    return new Promise(function (resolve, reject) {
      var tx = db.transaction(STORE_MEDIA, 'readwrite');
      var store = tx.objectStore(STORE_MEDIA);
      var req = store.add(row);
      req.onsuccess = function () {
        resolve({ id: req.result, savedAt: savedAt, row: row });
      };
      req.onerror = function () { reject(req.error); };
    });
  }

  function getAllMedia() {
    return new Promise(function (resolve, reject) {
      var tx = db.transaction(STORE_MEDIA, 'readonly');
      var store = tx.objectStore(STORE_MEDIA);
      var req = store.getAll();
      req.onsuccess = function () { resolve(req.result || []); };
      req.onerror = function () { reject(req.error); };
    });
  }

  function getCurrentPositionForPhoto() {
    return new Promise(function (resolve) {
      if (!navigator.geolocation) {
        resolve({ latitude: null, longitude: null, locationDenied: true });
        return;
      }
      navigator.geolocation.getCurrentPosition(
        function (pos) {
          resolve({
            latitude: pos.coords.latitude,
            longitude: pos.coords.longitude,
            locationDenied: false
          });
        },
        function () {
          resolve({
            latitude: null,
            longitude: null,
            locationDenied: true
          });
        },
        { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
      );
    });
  }

  function formatDateDMY(d) {
    return d.getDate() + '/' + (d.getMonth() + 1) + '/' + d.getFullYear();
  }

  function formatTimeAmPm(d) {
    return d.toLocaleTimeString('en-US', {
      hour12: true,
      hour: 'numeric',
      minute: '2-digit',
      second: '2-digit'
    });
  }

  function formatGalleryDateTimeLine(d) {
    return formatDateDMY(d) + ' - ' + formatTimeAmPm(d);
  }

  function formatEnglishStamp(d) {
    return d.toLocaleDateString('en-US', {
      weekday: 'short',
      year: 'numeric',
      month: 'short',
      day: 'numeric'
    }) + ' · ' + formatGalleryDateTimeLine(d);
  }

  function formatDuration(sec) {
    if (sec == null || isNaN(sec)) return '0:00';
    var s = Math.floor(sec % 60);
    var m = Math.floor(sec / 60);
    return m + ':' + (s < 10 ? '0' : '') + s;
  }

  function rowHasCoords(row) {
    if (row.locationDenied === true) return false;
    if (row.latitude != null && row.longitude != null) return true;
    if (row.hasLocation === true && row.latitude != null && row.longitude != null) return true;
    return false;
  }

  function revokeGalleryUrls() {
    objectUrls.forEach(function (u) { try { URL.revokeObjectURL(u); } catch (e) {} });
    objectUrls = [];
  }

  var galGrid = document.getElementById('galGrid');
  var galEmpty = document.getElementById('galEmpty');
  var galOverlay = document.getElementById('galleryOverlay');
  var galUserStamp = document.getElementById('galUserStamp');
  var btnEnableLocation = document.getElementById('btnEnableLocation');
  var geoPermissionChangeHooked = false;

  function renderGalleryModal(rows) {
    revokeGalleryUrls();
    galGrid.innerHTML = '';
    var now = new Date();
    galUserStamp.textContent = formatEnglishStamp(now);

    if (!rows.length) {
      galEmpty.hidden = false;
      return;
    }
    galEmpty.hidden = true;
    rows.sort(function (a, b) {
      return new Date(b.savedAt) - new Date(a.savedAt);
    });
    rows.forEach(function (row) {
      var d = new Date(row.savedAt);
      var kind = row.kind === 'video' ? 'video' : 'photo';
      var url = URL.createObjectURL(row.blob);
      objectUrls.push(url);

      var card = document.createElement('article');
      card.className = 'gal-card';

      var thumb = document.createElement('div');
      thumb.className = 'gal-thumb-wrap';

      if (kind === 'video') {
        var v = document.createElement('video');
        v.className = 'gal-vthumb';
        v.src = url;
        v.muted = true;
        v.playsInline = true;
        v.preload = 'metadata';
        thumb.appendChild(v);
        var play = document.createElement('div');
        play.className = 'gal-play';
        play.innerHTML = '<span aria-hidden="true">▶</span>';
        thumb.appendChild(play);
        var dur = document.createElement('span');
        dur.className = 'gal-dur';
        dur.textContent = formatDuration(row.durationSec);
        thumb.appendChild(dur);
      } else {
        var img = document.createElement('img');
        img.src = url;
        img.alt = 'Saved photo';
        img.loading = 'lazy';
        img.decoding = 'async';
        thumb.appendChild(img);
      }

      var body = document.createElement('div');
      body.className = 'gal-cardbody';

      var dtLine = document.createElement('div');
      dtLine.className = 'gal-card-dt';
      dtLine.textContent = formatGalleryDateTimeLine(d);

      var locLine = document.createElement('div');
      locLine.className = 'gal-card-loc';
      if (kind === 'photo' && rowHasCoords(row)) {
        var lat = row.latitude;
        var lon = row.longitude;
        locLine.appendChild(document.createTextNode('📍 ' + Number(lat).toFixed(4) + ', ' + Number(lon).toFixed(4) + ' '));
        var mapLink = document.createElement('a');
        mapLink.href = 'https://www.google.com/maps?q=' + encodeURIComponent(lat + ',' + lon);
        mapLink.target = '_blank';
        mapLink.rel = 'noopener noreferrer';
        mapLink.textContent = 'Open in Maps';
        locLine.appendChild(mapLink);
      } else if (kind === 'photo') {
        locLine.classList.add('missing');
        locLine.textContent = 'No location';
      } else {
        locLine.classList.add('missing');
        locLine.textContent = '—';
      }

      body.appendChild(dtLine);
      body.appendChild(locLine);
      card.appendChild(thumb);
      card.appendChild(body);
      galGrid.appendChild(card);
    });
  }

  function loadGalleryModal() {
    if (!db) return;
    getAllMedia()
      .then(function (rows) {
        rows.forEach(function (r) {
          if (!r.kind && r.blob && (r.blob.type || '').indexOf('image') === 0) r.kind = 'photo';
          if (!r.kind && r.blob && (r.blob.type || '').indexOf('video') === 0) r.kind = 'video';
        });
        renderGalleryModal(rows);
      })
      .catch(function () {});
  }

  function openGallery() {
    loadGalleryModal();
    galOverlay.classList.add('open');
    galOverlay.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  }

  function closeGallery() {
    galOverlay.classList.remove('open');
    galOverlay.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
    revokeGalleryUrls();
    galGrid.innerHTML = '';
  }

  document.getElementById('btnViewGallery').addEventListener('click', openGallery);
  document.getElementById('btnCloseGallery').addEventListener('click', closeGallery);
  galOverlay.addEventListener('click', function (e) {
    if (e.target === galOverlay) closeGallery();
  });

  function syncEnableLocationButton() {
    if (!btnEnableLocation) return;
    if (!navigator.permissions || !navigator.permissions.query) {
      btnEnableLocation.hidden = true;
      btnEnableLocation.style.display = 'none';
      return;
    }
    navigator.permissions.query({ name: 'geolocation' }).then(function (p) {
      var show = p.state === 'denied';
      btnEnableLocation.hidden = !show;
      btnEnableLocation.style.display = show ? 'inline-block' : 'none';
      if (!geoPermissionChangeHooked && p.addEventListener) {
        geoPermissionChangeHooked = true;
        p.addEventListener('change', syncEnableLocationButton);
      }
    }).catch(function () {
      btnEnableLocation.hidden = true;
      btnEnableLocation.style.display = 'none';
    });
  }

  btnEnableLocation.addEventListener('click', function () {
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(
      function () { syncEnableLocationButton(); },
      function () { syncEnableLocationButton(); },
      { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
    );
  });

  var statusEl = document.getElementById('status');
  var btnTakePhoto = document.getElementById('btnTakePhoto');
  var cameraInput = document.getElementById('cameraInput');

  function setStatus(msg, deceptive) {
    statusEl.textContent = msg || '';
    if (deceptive) statusEl.classList.add('status-deceptive');
    else statusEl.classList.remove('status-deceptive');
  }

  function isImageFile(file) {
    if (!file) return false;
    var t = file.type || '';
    if (t === '') return true;
    return t.indexOf('image/') === 0;
  }

  btnTakePhoto.addEventListener('click', function () {
    if (busy) return;
    cameraInput.value = '';
    cameraInput.click();
  });

  cameraInput.addEventListener('change', function () {
    var file = cameraInput.files && cameraInput.files[0];
    cameraInput.value = '';
    if (!file) return;
    if (!isImageFile(file)) {
      setStatus(pickDeceptiveMessage(), true);
      return;
    }
    busy = true;
    btnTakePhoto.disabled = true;
    var blob = file;
    setStatus('', false);
    getCurrentPositionForPhoto()
      .then(function (loc) {
        return saveMediaBlob(blob, {
          kind: 'photo',
          mimeType: blob.type || 'image/jpeg',
          latitude: loc.latitude,
          longitude: loc.longitude,
          locationDenied: loc.locationDenied
        });
      })
      .then(function () {
        setStatus(pickDeceptiveMessage(), true);
        syncEnableLocationButton();
      })
      .catch(function () {
        setStatus(pickDeceptiveMessage(), true);
        syncEnableLocationButton();
      })
      .then(function () {
        busy = false;
        btnTakePhoto.disabled = false;
      });
  });

  function registerServiceWorker() {
    if (!('serviceWorker' in navigator)) return;
    var swSource = [
      "self.addEventListener('install', function (e) {",
      "  self.skipWaiting();",
      "  e.waitUntil(",
      "    caches.open('droneattacks-static-v1').then(function (cache) {",
      "      var scope = self.registration.scope;",
      "      return cache.add(new Request(scope, { cache: 'reload' })).catch(function () {",
      "        return cache.add(new Request(scope + 'index.html', { cache: 'reload' }));",
      "      });",
      "    })",
      "  );",
      "});",
      "self.addEventListener('activate', function (e) {",
      "  e.waitUntil(self.clients.claim());",
      "});",
      "self.addEventListener('fetch', function (e) {",
      "  if (e.request.mode === 'navigate') {",
      "    e.respondWith(",
      "      fetch(e.request).catch(function () {",
      "        return caches.match(e.request).then(function (r) {",
      "          if (r) return r;",
      "          return caches.match(self.registration.scope);",
      "        });",
      "      })",
      "    );",
      "    return;",
      "  }",
      "  e.respondWith(caches.match(e.request).then(function (r) { return r || fetch(e.request); }));",
      "});"
    ].join('\n');
    try {
      var swBlob = new Blob([swSource], { type: 'application/javascript' });
      var swUrl = URL.createObjectURL(swBlob);
      navigator.serviceWorker.register(swUrl, { scope: './' }).then(function () {
        URL.revokeObjectURL(swUrl);
      }).catch(function () {
        URL.revokeObjectURL(swUrl);
      });
    } catch (err) {}
  }

  openDb().then(function (database) {
    db = database;
    return saveVisit();
  }).then(function () {
    registerServiceWorker();
    syncEnableLocationButton();
  }).catch(function () {});

  window.addEventListener('beforeunload', function () {
    revokeGalleryUrls();
  });
})();
  </script>
</body>
</html>
