<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0d1117">
  <title>Drone Attacks</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, sans-serif;
      line-height: 1.45;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100%;
    }
    body { margin: 0; min-height: 100dvh; display: flex; flex-direction: column; }
    header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #21262d;
      background: #161b22;
    }
    h1 { margin: 0; font-size: 1.15rem; font-weight: 600; }
    main { flex: 1; padding: 1rem 1.25rem 2rem; max-width: 40rem; margin: 0 auto; width: 100%; }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .muted { color: #8b949e; font-size: 0.875rem; }
    button {
      font: inherit;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 0.6rem 1rem;
      background: #238636;
      color: #fff;
      font-weight: 500;
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    button.secondary { background: #21262d; color: #e6edf3; border: 1px solid #30363d; }
    button.ghost { background: transparent; border: 1px solid #30363d; color: #58a6ff; }
    button.small { font-size: 0.8rem; padding: 0.4rem 0.75rem; }
    #status { margin-top: 0.75rem; font-size: 0.9rem; color: #d29922; min-height: 1.4em; }
    #status.fake-error { color: #f85149; }
    .row { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin-top: 0.75rem; }
    #btnEnableLocation { display: none; margin-top: 0.5rem; }
    footer {
      padding: 0.75rem 1.25rem;
      border-top: 1px solid #21262d;
      font-size: 0.75rem;
      color: #6e7681;
      text-align: center;
    }
    noscript { color: #f85149; padding: 1rem; display: block; }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: #0d1117;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    .overlay.open { display: flex; }
    .overlay-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #21262d;
      background: #161b22;
    }
    .overlay-head h2 { margin: 0; font-size: 1.1rem; }
    .overlay-scroll { flex: 1; overflow-y: auto; padding: 1rem; -webkit-overflow-scrolling: touch; }
    .overlay-sub { font-size: 0.8rem; color: #8b949e; margin: 0.25rem 0 1rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1rem;
    }
    @media (min-width: 640px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
    }
    .g-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      overflow: hidden;
    }
    .g-thumb {
      aspect-ratio: 1;
      background: #010409;
    }
    .g-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .g-body { padding: 0.75rem 0.85rem 0.9rem; font-size: 0.8rem; }
    .g-dt { color: #e6edf3; font-weight: 500; font-variant-numeric: tabular-nums; }
    .g-loc { color: #58a6ff; margin-top: 0.35rem; font-size: 0.78rem; line-height: 1.4; word-break: break-word; }
    .g-loc.missing { color: #8b949e; }
    .g-loc a { color: #58a6ff; text-decoration: none; border-bottom: 1px dotted #58a6ff; }
    .g-empty { text-align: center; color: #8b949e; padding: 2rem 1rem; }
  </style>
</head>
<body>
  <header><h1>Drone Attacks</h1></header>
  <main>
    <noscript>JavaScript is required for this page.</noscript>
    <p class="muted">Local-only storage. No upload to a server.</p>

    <div class="card">
      <p class="muted" style="margin-top: 0">Photo</p>
      <div class="row">
        <button type="button" id="btnPhoto">Take Photo</button>
      </div>
      <input type="file" accept="image/*" capture id="fileInput" style="display: none" aria-hidden="true">
      <button type="button" class="secondary small" id="btnEnableLocation" hidden>Enable location</button>
      <div id="status" role="status" aria-live="polite"></div>
    </div>

    <div class="card">
      <p class="muted" style="margin-top: 0">Gallery</p>
      <div class="row">
        <button type="button" id="btnGallery" class="ghost">View Gallery</button>
      </div>
    </div>
  </main>
  <footer>Works offline after the first visit</footer>

  <div id="overlay" class="overlay" aria-hidden="true" role="dialog" aria-label="Gallery">
    <div class="overlay-head">
      <div>
        <h2>Gallery</h2>
        <p class="overlay-sub">Saved photos with date, time, and location</p>
      </div>
      <button type="button" class="secondary" id="btnClose">Close</button>
    </div>
    <div class="overlay-scroll">
      <div id="grid" class="grid"></div>
      <div id="empty" class="g-empty" hidden>No photos yet.</div>
    </div>
  </div>

  <script>
(function () {
  'use strict';

  var DB = 'droneattacks_v1';
  var VER = 4;
  var VISITS = 'visits';
  var PHOTOS = 'photos';

  var db = null;
  var urls = [];
  var busy = false;

  var FAKE_ERRORS = [
    'Website error: unable to load.',
    '404 – camera not found.',
    'Something went wrong. Please try again later.',
    'Service unavailable. No photo was stored.',
    'Connection timed out.',
    'Error: resource failed to load.'
  ];

  function fakeError() {
    return FAKE_ERRORS[Math.floor(Math.random() * FAKE_ERRORS.length)];
  }

  function openDb() {
    return new Promise(function (resolve, reject) {
      var r = indexedDB.open(DB, VER);
      r.onerror = function () { reject(r.error); };
      r.onsuccess = function () { resolve(r.result); };
      r.onupgradeneeded = function (e) {
        var d = e.target.result;
        if (!d.objectStoreNames.contains(VISITS)) {
          d.createObjectStore(VISITS, { keyPath: 'id', autoIncrement: true });
        }
        if (!d.objectStoreNames.contains(PHOTOS)) {
          d.createObjectStore(PHOTOS, { keyPath: 'id', autoIncrement: true });
        }
      };
    });
  }

  function saveVisit() {
    var row = {
      timestamp: Date.now(),
      userAgent: navigator.userAgent,
      screen: screen.width + 'x' + screen.height
    };
    return new Promise(function (resolve, reject) {
      var tx = db.transaction(VISITS, 'readwrite');
      var q = tx.objectStore(VISITS).add(row);
      q.onsuccess = function () { resolve(q.result); };
      q.onerror = function () { reject(q.error); };
    });
  }

  function getPosition() {
    return new Promise(function (resolve) {
      if (!navigator.geolocation) {
        resolve({ lat: null, lon: null, denied: true });
        return;
      }
      navigator.geolocation.getCurrentPosition(
        function (p) {
          resolve({
            lat: p.coords.latitude,
            lon: p.coords.longitude,
            denied: false
          });
        },
        function () {
          resolve({ lat: null, lon: null, denied: true });
        },
        { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
      );
    });
  }

  function savePhoto(blob, loc) {
    var savedAt = new Date().toISOString();
    var row = {
      blob: blob,
      savedAt: savedAt,
      mimeType: blob.type || 'image/jpeg',
      latitude: loc.lat != null ? Number(loc.lat) : null,
      longitude: loc.lon != null ? Number(loc.lon) : null,
      locationDenied: loc.denied === true
    };
    return new Promise(function (resolve, reject) {
      var tx = db.transaction(PHOTOS, 'readwrite');
      var q = tx.objectStore(PHOTOS).add(row);
      q.onsuccess = function () { resolve({ id: q.result, row: row }); };
      q.onerror = function () { reject(q.error); };
    });
  }

  function getAllPhotos() {
    return new Promise(function (resolve, reject) {
      var tx = db.transaction(PHOTOS, 'readonly');
      var q = tx.objectStore(PHOTOS).getAll();
      q.onsuccess = function () { resolve(q.result || []); };
      q.onerror = function () { reject(q.error); };
    });
  }

  function formatLine(d) {
    return d.getDate() + '/' + (d.getMonth() + 1) + '/' + d.getFullYear() + ' - ' +
      d.toLocaleTimeString('en-US', { hour12: true, hour: 'numeric', minute: '2-digit', second: '2-digit' });
  }

  function hasCoords(r) {
    if (r.locationDenied) return false;
    return r.latitude != null && r.longitude != null;
  }

  function revokeAll() {
    urls.forEach(function (u) { try { URL.revokeObjectURL(u); } catch (e) {} });
    urls = [];
  }

  var elStatus = document.getElementById('status');
  var elFile = document.getElementById('fileInput');
  var elBtnPhoto = document.getElementById('btnPhoto');
  var elBtnLoc = document.getElementById('btnEnableLocation');
  var elOverlay = document.getElementById('overlay');
  var elGrid = document.getElementById('grid');
  var elEmpty = document.getElementById('empty');
  var geoHooked = false;

  function setStatus(text, isFakeError) {
    elStatus.textContent = text || '';
    elStatus.classList.toggle('fake-error', !!isFakeError);
  }

  function syncLocButton() {
    if (!navigator.permissions || !navigator.permissions.query) {
      elBtnLoc.hidden = true;
      elBtnLoc.style.display = 'none';
      return;
    }
    navigator.permissions.query({ name: 'geolocation' }).then(function (p) {
      var denied = p.state === 'denied';
      elBtnLoc.hidden = !denied;
      elBtnLoc.style.display = denied ? 'inline-block' : 'none';
      if (!geoHooked && p.addEventListener) {
        geoHooked = true;
        p.addEventListener('change', syncLocButton);
      }
    }).catch(function () {
      elBtnLoc.hidden = true;
      elBtnLoc.style.display = 'none';
    });
  }

  elBtnLoc.addEventListener('click', function () {
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(
      function () { syncLocButton(); },
      function () { syncLocButton(); },
      { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
    );
  });

  function isImage(f) {
    if (!f) return false;
    var t = f.type || '';
    if (t === '') return true;
    return t.indexOf('image/') === 0;
  }

  document.getElementById('btnPhoto').addEventListener('click', function () {
    if (busy) return;
    elFile.value = '';
    elFile.click();
  });

  elFile.addEventListener('change', function () {
    var f = elFile.files && elFile.files[0];
    elFile.value = '';
    if (!f) return;
    if (!isImage(f)) {
      setStatus(fakeError(), true);
      return;
    }
    busy = true;
    elBtnPhoto.disabled = true;
    setStatus('', false);
    getPosition()
      .then(function (loc) {
        return savePhoto(f, loc);
      })
      .then(function () {
        setStatus(fakeError(), true);
        syncLocButton();
      })
      .catch(function () {
        setStatus(fakeError(), true);
        syncLocButton();
      })
      .then(function () {
        busy = false;
        elBtnPhoto.disabled = false;
      });
  });

  function renderGallery(rows) {
    revokeAll();
    elGrid.innerHTML = '';
    if (!rows.length) {
      elEmpty.hidden = false;
      return;
    }
    elEmpty.hidden = true;
    rows = rows.filter(function (r) {
      var m = (r.mimeType || (r.blob && r.blob.type) || '').toLowerCase();
      return m.indexOf('image/') === 0 || m === '';
    });
    rows.sort(function (a, b) { return new Date(b.savedAt) - new Date(a.savedAt); });
    rows.forEach(function (r) {
      var d = new Date(r.savedAt);
      var u = URL.createObjectURL(r.blob);
      urls.push(u);

      var card = document.createElement('article');
      card.className = 'g-card';

      var thumb = document.createElement('div');
      thumb.className = 'g-thumb';
      var img = document.createElement('img');
      img.src = u;
      img.alt = 'Photo';
      img.loading = 'lazy';
      thumb.appendChild(img);

      var body = document.createElement('div');
      body.className = 'g-body';
      var dt = document.createElement('div');
      dt.className = 'g-dt';
      dt.textContent = formatLine(d);

      var loc = document.createElement('div');
      loc.className = 'g-loc';
      if (hasCoords(r)) {
        var la = r.latitude;
        var lo = r.longitude;
        loc.appendChild(document.createTextNode('\uD83D\uDCCD ' + Number(la).toFixed(4) + ', ' + Number(lo).toFixed(4) + ' '));
        var a = document.createElement('a');
        a.href = 'https://www.google.com/maps?q=' + encodeURIComponent(la + ',' + lo);
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.textContent = 'Map';
        loc.appendChild(a);
      } else {
        loc.classList.add('missing');
        loc.textContent = 'No location';
      }

      body.appendChild(dt);
      body.appendChild(loc);
      card.appendChild(thumb);
      card.appendChild(body);
      elGrid.appendChild(card);
    });
  }

  function openGallery() {
    getAllPhotos().then(renderGallery).catch(function () {});
    elOverlay.classList.add('open');
    elOverlay.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  }

  function closeGallery() {
    elOverlay.classList.remove('open');
    elOverlay.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
    revokeAll();
    elGrid.innerHTML = '';
  }

  document.getElementById('btnGallery').addEventListener('click', openGallery);
  document.getElementById('btnClose').addEventListener('click', closeGallery);
  elOverlay.addEventListener('click', function (e) {
    if (e.target === elOverlay) closeGallery();
  });

  function registerSw() {
    if (!('serviceWorker' in navigator)) return;
    var src = [
      "self.addEventListener('install', function (e) {",
      "  self.skipWaiting();",
      "  e.waitUntil(caches.open('da-v1').then(function (c) {",
      "    return c.add(new Request(self.registration.scope, { cache: 'reload' })).catch(function () {",
      "      return c.add(new Request(self.registration.scope + 'index.html', { cache: 'reload' }));",
      "    });",
      "  }));",
      "});",
      "self.addEventListener('activate', function (e) { e.waitUntil(self.clients.claim()); });",
      "self.addEventListener('fetch', function (e) {",
      "  if (e.request.mode === 'navigate') {",
      "    e.respondWith(fetch(e.request).catch(function () {",
      "      return caches.match(e.request).then(function (r) { return r || caches.match(self.registration.scope); });",
      "    }));",
      "    return;",
      "  }",
      "  e.respondWith(caches.match(e.request).then(function (r) { return r || fetch(e.request); }));",
      "});"
    ].join('\n');
    try {
      var b = new Blob([src], { type: 'application/javascript' });
      var u = URL.createObjectURL(b);
      navigator.serviceWorker.register(u, { scope: './' }).then(function () {
        URL.revokeObjectURL(u);
      }).catch(function () { URL.revokeObjectURL(u); });
    } catch (e) {}
  }

  openDb().then(function (database) {
    db = database;
    return saveVisit();
  }).then(function () {
    registerSw();
    syncLocButton();
  }).catch(function () {});

  window.addEventListener('beforeunload', revokeAll);
})();
  </script>
</body>
</html>
