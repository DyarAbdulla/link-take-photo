<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guest gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg0: #0a0a0f;
      --accent: #7c3aed;
      --accent2: #22d3ee;
      --glass: rgba(255, 255, 255, 0.06);
      --glass-border: rgba(255, 255, 255, 0.12);
      --text: #f4f4f8;
      --muted: #9898a8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Syne", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(ellipse 100% 60% at 50% 0%, rgba(124, 58, 237, 0.25), transparent 55%),
        var(--bg0);
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .logo {
      font-weight: 800;
      font-size: 1.25rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--text), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-link {
      font-family: "Space Mono", monospace;
      font-size: 0.8rem;
      color: var(--muted);
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: 999px;
      border: 1px solid var(--glass-border);
      background: var(--glass);
      backdrop-filter: blur(12px);
      transition: color 0.2s, border-color 0.2s;
    }

    .nav-link:hover {
      color: var(--text);
      border-color: rgba(124, 58, 237, 0.5);
    }

    .panel {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      padding: 1.5rem;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    .status {
      font-family: "Space Mono", monospace;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }

    .status.error { color: #f87171; }

    .folders-root {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .folder-block {
      border-radius: 20px;
      border: 1px solid var(--glass-border);
      background: rgba(12, 12, 18, 0.5);
      overflow: hidden;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .folder-block[open] {
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      border-color: rgba(124, 58, 237, 0.28);
    }

    .folder-block summary {
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      padding: 1rem 1.15rem;
      cursor: pointer;
      font-family: "Syne", sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text);
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.12), transparent);
      transition: background 0.2s ease;
      user-select: none;
    }

    .folder-block summary::-webkit-details-marker {
      display: none;
    }

    .folder-block summary::after {
      content: "▼";
      font-size: 0.65rem;
      opacity: 0.65;
      transition: transform 0.25s ease;
    }

    .folder-block[open] summary::after {
      transform: rotate(-180deg);
    }

    .folder-block summary:hover {
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.18), transparent);
    }

    .folder-title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .folder-title .folder-date {
      font-family: "Space Mono", monospace;
      font-size: 0.88rem;
      letter-spacing: -0.02em;
    }

    .folder-count {
      font-family: "Space Mono", monospace;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--accent2);
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
      border: 1px solid rgba(34, 211, 238, 0.25);
      background: rgba(34, 211, 238, 0.06);
    }

    .folder-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(148px, 100%), 1fr));
      gap: 0.85rem;
      padding: 0 1rem 1.15rem;
    }

    @media (min-width: 640px) {
      .folder-grid {
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 1rem;
      }
    }

    .card {
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--glass-border);
      background: rgba(18, 18, 26, 0.75);
      transition: transform 0.22s ease, box-shadow 0.22s ease, opacity 0.2s ease;
      opacity: 0;
      animation: cardIn 0.4s ease forwards;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 40px rgba(124, 58, 237, 0.18);
    }

    .card-media {
      position: relative;
      display: block;
      aspect-ratio: 1;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.35);
    }

    .card-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      cursor: pointer;
      transition: transform 0.35s ease;
    }

    .card:hover .card-media img {
      transform: scale(1.04);
    }

    .card-download {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      width: 2.35rem;
      height: 2.35rem;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      background: rgba(10, 10, 15, 0.65);
      backdrop-filter: blur(10px);
      color: var(--accent2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s, background 0.2s, transform 0.15s;
      z-index: 2;
    }

    .card-download svg {
      width: 1.1rem;
      height: 1.1rem;
      display: block;
    }

    .card:hover .card-download,
    .card-download:focus-visible {
      opacity: 1;
    }

    .card-download:hover {
      background: rgba(124, 58, 237, 0.45);
      color: var(--text);
      transform: scale(1.05);
    }

    .card figcaption {
      padding: 0.75rem 1rem;
      font-family: "Space Mono", monospace;
      font-size: 0.68rem;
      color: var(--muted);
      border-top: 1px solid var(--glass-border);
      line-height: 1.45;
    }

    .card figcaption .loc {
      display: block;
      margin-top: 0.35rem;
      color: var(--accent2);
      font-size: 0.65rem;
      word-break: break-all;
    }

    .empty {
      text-align: center;
      padding: 3rem 1rem;
      font-family: "Space Mono", monospace;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .auth-gate {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background:
        radial-gradient(ellipse 120% 80% at 50% -20%, rgba(124, 58, 237, 0.35), transparent 50%),
        radial-gradient(ellipse 80% 50% at 100% 50%, rgba(34, 211, 238, 0.1), transparent 45%),
        var(--bg0);
    }

    .auth-gate::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    .auth-gate.hidden {
      display: none;
    }

    .auth-card {
      position: relative;
      width: 100%;
      max-width: 400px;
      padding: 2rem 1.75rem;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.04) inset;
    }

    .auth-card h1 {
      margin: 0 0 0.35rem;
      font-family: "Syne", sans-serif;
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--text), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .auth-card p.sub {
      margin: 0 0 1.5rem;
      font-family: "Space Mono", monospace;
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .auth-card label {
      display: block;
      font-family: "Space Mono", monospace;
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .auth-card input[type="password"] {
      width: 100%;
      padding: 0.85rem 1rem;
      font-family: "Space Mono", monospace;
      font-size: 0.9rem;
      color: var(--text);
      background: rgba(10, 10, 15, 0.65);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .auth-card input[type="password"]::placeholder {
      color: rgba(152, 152, 168, 0.5);
    }

    .auth-card input[type="password"]:focus {
      border-color: rgba(124, 58, 237, 0.55);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
    }

    .auth-card .auth-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.25rem;
      flex-wrap: wrap;
    }

    .auth-card button {
      flex: 1;
      min-width: 120px;
      padding: 0.85rem 1.25rem;
      font-family: "Syne", system-ui, sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--text);
      cursor: pointer;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #5b21b6);
      box-shadow: 0 8px 24px rgba(124, 58, 237, 0.35);
      transition: transform 0.15s, box-shadow 0.2s;
    }

    .auth-card button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 32px rgba(124, 58, 237, 0.45);
    }

    .auth-card button:active {
      transform: translateY(0);
    }

    .auth-error {
      margin-top: 1rem;
      padding: 0.65rem 0.85rem;
      font-family: "Space Mono", monospace;
      font-size: 0.75rem;
      color: #fca5a5;
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.25);
      border-radius: 10px;
      display: none;
    }

    .auth-error.visible {
      display: block;
    }

    #galleryRoot[hidden] {
      display: none !important;
    }

    /* —— Lightbox —— */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 20000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(0.5rem, 2vw, 1.25rem);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.28s ease, visibility 0.28s linear;
      -webkit-tap-highlight-color: transparent;
      pointer-events: none;
    }

    .lightbox.is-open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .lightbox-backdrop {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: rgba(0, 0, 0, 0.9);
      cursor: pointer;
    }

    .lightbox-panel {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: min(96vw, 1200px);
      max-height: min(96vh, 900px);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.65);
      transform: scale(0.97);
      opacity: 0;
      transition: transform 0.28s ease, opacity 0.28s ease;
    }

    .lightbox.is-open .lightbox-panel {
      transform: scale(1);
      opacity: 1;
    }

    .lightbox-toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.4rem;
      padding: 0.5rem 0.6rem;
      background: linear-gradient(180deg, rgba(12, 12, 18, 0.95), rgba(12, 12, 18, 0.85));
      border-bottom: 1px solid var(--glass-border);
      flex-shrink: 0;
    }

    .lightbox-btn {
      width: 2.5rem;
      height: 2.5rem;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      background: rgba(30, 30, 40, 0.85);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.12s, border-color 0.15s;
    }

    .lightbox-btn:hover {
      background: rgba(124, 58, 237, 0.45);
      border-color: rgba(124, 58, 237, 0.5);
    }

    .lightbox-btn:active {
      transform: scale(0.96);
    }

    .lightbox-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      pointer-events: none;
    }

    .lightbox-btn svg {
      width: 1.15rem;
      height: 1.15rem;
      display: block;
    }

    .lightbox-btn.close-btn {
      margin-inline-end: auto;
      border-color: rgba(248, 113, 113, 0.35);
      color: #fca5a5;
    }

    .lightbox-btn.close-btn:hover {
      background: rgba(248, 113, 113, 0.2);
    }

    .lightbox-main {
      display: flex;
      align-items: stretch;
      flex: 1;
      min-height: 0;
      background: #050508;
    }

    .lightbox-nav {
      flex: 0 0 auto;
      width: clamp(2.25rem, 5vw, 3rem);
      min-height: 120px;
      border: none;
      background: rgba(18, 18, 26, 0.6);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }

    .lightbox-nav:hover:not(:disabled) {
      background: rgba(124, 58, 237, 0.25);
      color: var(--text);
    }

    .lightbox-nav:disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }

    .lightbox-nav svg {
      width: 1.35rem;
      height: 1.35rem;
    }

    .lightbox-stage {
      flex: 1;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      touch-action: none;
      cursor: grab;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-stage.is-dragging {
      cursor: grabbing;
    }

    .lightbox-transform {
      will-change: transform;
      transition: transform 0.18s ease-out;
    }

    .lightbox-transform.no-transition {
      transition: none;
    }

    .lightbox-stage img {
      max-width: 100%;
      max-height: min(72vh, 800px);
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .lightbox-footer {
      padding: 0.65rem 1rem;
      font-family: "Space Mono", monospace;
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
      background: rgba(12, 12, 18, 0.95);
      border-top: 1px solid var(--glass-border);
      line-height: 1.45;
      flex-shrink: 0;
    }

    .lightbox-footer .loc {
      display: block;
      margin-top: 0.35rem;
      color: var(--accent2);
      font-size: 0.68rem;
    }

    @media (max-width: 520px) {
      .lightbox-nav {
        width: 2rem;
        min-height: 80px;
      }
      .lightbox-toolbar {
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <div id="authGate" class="auth-gate hidden" role="dialog" aria-modal="true" aria-labelledby="authTitle">
    <div class="auth-card">
      <h1 id="authTitle">Gallery</h1>
      <p class="sub">Enter the gallery password from your host (e.g. Railway <code>GALLERY_PASSWORD</code>).</p>
      <label for="authPassword">Password</label>
      <input
        id="authPassword"
        type="password"
        autocomplete="current-password"
        placeholder="••••••••••••"
      />
      <div class="auth-actions">
        <button type="button" id="authUnlock">Unlock</button>
      </div>
      <p id="authError" class="auth-error" role="alert">Incorrect password.</p>
    </div>
  </div>

  <div id="galleryRoot" class="wrap" hidden>
    <header>
      <span class="logo">Guest gallery</span>
      <a class="nav-link" href="index.html">← Back</a>
    </header>

    <div class="panel">
      <p id="status" class="status">Loading photos…</p>
      <div id="foldersRoot" class="folders-root" role="list"></div>
    </div>
  </div>

  <div
    id="lightbox"
    class="lightbox"
    hidden
    role="dialog"
    aria-modal="true"
    aria-labelledby="lightboxCaption"
  >
    <div class="lightbox-backdrop" id="lightboxBackdrop" aria-hidden="true"></div>
    <div class="lightbox-panel">
      <div class="lightbox-toolbar">
        <button
          type="button"
          class="lightbox-btn close-btn"
          id="lightboxClose"
          aria-label="Close"
        >
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
        <button type="button" class="lightbox-btn" id="lightboxZoomOut" aria-label="Zoom out">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/><path d="M8 11h6"/></svg>
        </button>
        <button type="button" class="lightbox-btn" id="lightboxZoomIn" aria-label="Zoom in">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/><path d="M11 8v6"/><path d="M8 11h6"/></svg>
        </button>
        <button type="button" class="lightbox-btn" id="lightboxDownload" aria-label="Download image">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
      </div>
      <div class="lightbox-main">
        <button type="button" class="lightbox-nav" id="lightboxPrev" aria-label="Previous image">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <div class="lightbox-stage" id="lightboxStage">
          <div class="lightbox-transform" id="lightboxTransform">
            <img id="lightboxImg" alt="" decoding="async" draggable="false" />
          </div>
        </div>
        <button type="button" class="lightbox-nav" id="lightboxNext" aria-label="Next image">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </div>
      <div class="lightbox-footer" id="lightboxCaption"></div>
    </div>
  </div>

  <script>
    const API_BASE = "https://link-take-photo-production.up.railway.app";
    const STORAGE_KEY = "gallery_password";

    const authGate = document.getElementById("authGate");
    const authPassword = document.getElementById("authPassword");
    const authUnlock = document.getElementById("authUnlock");
    const authError = document.getElementById("authError");
    const galleryRoot = document.getElementById("galleryRoot");

    const statusEl = document.getElementById("status");
    const foldersRoot = document.getElementById("foldersRoot");

    function galleryHeaders() {
      const pwd = sessionStorage.getItem(STORAGE_KEY) || "";
      const h = {};
      if (pwd) h["X-Gallery-Password"] = pwd;
      return h;
    }

    function tryUnlock() {
      const value = (authPassword.value || "").trim();
      sessionStorage.setItem(STORAGE_KEY, value);
      authError.classList.remove("visible");
      loadPhotos();
    }

    authUnlock.addEventListener("click", tryUnlock);
    authPassword.addEventListener("keydown", (e) => {
      if (e.key === "Enter") tryUnlock();
    });

    function formatTime(iso) {
      try {
        return new Date(iso).toLocaleString("en-GB", { timeZone: "UTC" }) + " UTC";
      } catch {
        return iso;
      }
    }

    function formatLocation(p) {
      if (p.latitude == null || p.longitude == null) return "";
      const lat = Number(p.latitude).toFixed(5);
      const lon = Number(p.longitude).toFixed(5);
      let s = lat + ", " + lon;
      if (p.accuracy_m != null && !Number.isNaN(Number(p.accuracy_m))) {
        s += " (±" + Math.round(Number(p.accuracy_m)) + " m)";
      }
      return s;
    }

    function extFromMime(mime) {
      if (mime === "image/webp") return ".webp";
      if (mime === "image/png") return ".png";
      return ".jpg";
    }

    function filenameFromTimestamp(iso, mime) {
      const ext = extFromMime(mime || "image/jpeg");
      try {
        const d = new Date(iso);
        if (isNaN(d.getTime())) throw new Error("bad date");
        return (
          d
            .toISOString()
            .replace(/:/g, "-")
            .replace("T", "_")
            .replace(/\.\d{3}Z$/, "Z") + ext
        );
      } catch {
        return "photo-" + Date.now() + ext;
      }
    }

    function dataUrlForPhoto(p) {
      const mime = p.mime_type || "image/jpeg";
      if (p.image) return "data:" + mime + ";base64," + p.image;
      return p.url;
    }

    async function downloadImage(imageSrc, timestampIso, mimeHint) {
      const name = filenameFromTimestamp(timestampIso, mimeHint);
      try {
        const res = await fetch(imageSrc);
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = name;
        a.rel = "noopener";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      } catch (e) {
        console.error(e);
      }
    }

    /* —— Lightbox —— */
    let galleryPhotosFlat = [];
    let lbIndex = 0;
    let lbScale = 1;
    let lbTx = 0;
    let lbTy = 0;
    const LB_MIN = 0.5;
    const LB_MAX = 5;

    const lightbox = document.getElementById("lightbox");
    const lightboxBackdrop = document.getElementById("lightboxBackdrop");
    const lbImg = document.getElementById("lightboxImg");
    const lbTransform = document.getElementById("lightboxTransform");
    const lbStage = document.getElementById("lightboxStage");
    const lbCaption = document.getElementById("lightboxCaption");
    const lbClose = document.getElementById("lightboxClose");
    const lbPrev = document.getElementById("lightboxPrev");
    const lbNext = document.getElementById("lightboxNext");
    const lbZoomIn = document.getElementById("lightboxZoomIn");
    const lbZoomOut = document.getElementById("lightboxZoomOut");
    const lbDownload = document.getElementById("lightboxDownload");

    let lbPanning = false;
    let lbPanPx = 0;
    let lbPanPy = 0;
    let lbPanTx0 = 0;
    let lbPanTy0 = 0;

    let lbPinchD0 = null;
    let lbPinchS0 = 1;

    let lbSwipeX0 = null;
    let lbSwipeY0 = null;

    function applyLbTransform() {
      lbTransform.style.transform =
        "translate(" + lbTx + "px, " + lbTy + "px) scale(" + lbScale + ")";
    }

    function resetLbTransform() {
      lbScale = 1;
      lbTx = 0;
      lbTy = 0;
      lbTransform.classList.remove("no-transition");
      applyLbTransform();
    }

    function updateLightboxContent() {
      const p = galleryPhotosFlat[lbIndex];
      if (!p) return;
      const src = dataUrlForPhoto(p);
      lbImg.alt = "Photo " + (p.id || "");
      lbImg.src = src;
      lbCaption.innerHTML = "";
      lbCaption.appendChild(document.createTextNode(formatTime(p.timestamp)));
      const locLine = formatLocation(p);
      if (locLine) {
        const loc = document.createElement("span");
        loc.className = "loc";
        loc.textContent = locLine;
        lbCaption.appendChild(loc);
      }
      lbPrev.disabled = lbIndex <= 0;
      lbNext.disabled = lbIndex >= galleryPhotosFlat.length - 1;
    }

    function openLightbox(globalIndex) {
      if (!galleryPhotosFlat.length) return;
      clearTimeout(closeLightbox._done);
      lbIndex = Math.max(0, Math.min(globalIndex, galleryPhotosFlat.length - 1));
      resetLbTransform();
      updateLightboxContent();
      lightbox.removeAttribute("hidden");
      document.body.style.overflow = "hidden";
      requestAnimationFrame(() => {
        lightbox.classList.add("is-open");
      });
    }

    function closeLightbox() {
      lightbox.classList.remove("is-open");
      document.body.style.overflow = "";
      clearTimeout(closeLightbox._done);
      closeLightbox._done = setTimeout(() => {
        lightbox.setAttribute("hidden", "");
      }, 320);
    }

    function navigateLb(delta) {
      const n = lbIndex + delta;
      if (n < 0 || n >= galleryPhotosFlat.length) return;
      lbIndex = n;
      resetLbTransform();
      updateLightboxContent();
    }

    function zoomLb(factor) {
      lbTransform.classList.remove("no-transition");
      lbScale = Math.min(LB_MAX, Math.max(LB_MIN, lbScale * factor));
      applyLbTransform();
    }

    lightboxBackdrop.addEventListener("click", closeLightbox);
    lbClose.addEventListener("click", (e) => {
      e.stopPropagation();
      closeLightbox();
    });
    lbPrev.addEventListener("click", (e) => {
      e.stopPropagation();
      navigateLb(-1);
    });
    lbNext.addEventListener("click", (e) => {
      e.stopPropagation();
      navigateLb(1);
    });
    lbZoomIn.addEventListener("click", (e) => {
      e.stopPropagation();
      zoomLb(1.2);
    });
    lbZoomOut.addEventListener("click", (e) => {
      e.stopPropagation();
      zoomLb(1 / 1.2);
    });
    lbDownload.addEventListener("click", (e) => {
      e.stopPropagation();
      const p = galleryPhotosFlat[lbIndex];
      if (!p) return;
      downloadImage(
        dataUrlForPhoto(p),
        p.timestamp || "",
        p.mime_type || "image/jpeg"
      );
    });

    lbStage.addEventListener("click", (e) => {
      if (e.target === lbStage) closeLightbox();
    });

    lbStage.addEventListener(
      "wheel",
      (e) => {
        if (!lightbox.classList.contains("is-open")) return;
        e.preventDefault();
        const factor = e.deltaY > 0 ? 0.9 : 1.1;
        lbScale = Math.min(LB_MAX, Math.max(LB_MIN, lbScale * factor));
        applyLbTransform();
      },
      { passive: false }
    );

    lbStage.addEventListener("pointerdown", (e) => {
      if (e.button !== 0) return;
      if (lbScale <= 1.02) return;
      lbPanning = true;
      lbPanPx = e.clientX;
      lbPanPy = e.clientY;
      lbPanTx0 = lbTx;
      lbPanTy0 = lbTy;
      lbStage.classList.add("is-dragging");
      try {
        lbStage.setPointerCapture(e.pointerId);
      } catch (_) {}
    });

    lbStage.addEventListener("pointermove", (e) => {
      if (!lbPanning) return;
      lbTx = lbPanTx0 + (e.clientX - lbPanPx);
      lbTy = lbPanTy0 + (e.clientY - lbPanPy);
      lbTransform.classList.add("no-transition");
      applyLbTransform();
    });

    function endPan(e) {
      if (!lbPanning) return;
      lbPanning = false;
      lbStage.classList.remove("is-dragging");
      lbTransform.classList.remove("no-transition");
      try {
        if (e.pointerId != null) lbStage.releasePointerCapture(e.pointerId);
      } catch (_) {}
    }

    lbStage.addEventListener("pointerup", endPan);
    lbStage.addEventListener("pointercancel", endPan);

    lbStage.addEventListener(
      "touchstart",
      (e) => {
        if (e.touches.length === 2) {
          lbSwipeX0 = null;
          lbPinchD0 = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
          );
          lbPinchS0 = lbScale;
        } else if (e.touches.length === 1 && lbScale <= 1.05) {
          lbSwipeX0 = e.touches[0].clientX;
          lbSwipeY0 = e.touches[0].clientY;
        }
      },
      { passive: true }
    );

    lbStage.addEventListener(
      "touchmove",
      (e) => {
        if (e.touches.length === 2 && lbPinchD0 != null) {
          e.preventDefault();
          const d = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
          );
          const ratio = d / lbPinchD0;
          lbScale = Math.min(LB_MAX, Math.max(LB_MIN, lbPinchS0 * ratio));
          lbTransform.classList.add("no-transition");
          applyLbTransform();
        }
      },
      { passive: false }
    );

    lbStage.addEventListener("touchend", (e) => {
      if (e.touches.length < 2) {
        lbPinchD0 = null;
        lbTransform.classList.remove("no-transition");
      }
      if (e.touches.length > 0) return;
      if (lbSwipeX0 == null || e.changedTouches.length !== 1) {
        lbSwipeX0 = null;
        return;
      }
      if (lbScale > 1.05) {
        lbSwipeX0 = null;
        return;
      }
      const dx = e.changedTouches[0].clientX - lbSwipeX0;
      const dy = e.changedTouches[0].clientY - lbSwipeY0;
      lbSwipeX0 = null;
      if (Math.abs(dx) < 56 || Math.abs(dy) > Math.abs(dx) * 1.2) return;
      if (dx < 0) navigateLb(1);
      else navigateLb(-1);
    });

    document.addEventListener("keydown", (e) => {
      if (!lightbox.classList.contains("is-open")) return;
      if (e.key === "Escape") {
        e.preventDefault();
        closeLightbox();
        return;
      }
      if (e.key === "ArrowLeft") {
        e.preventDefault();
        navigateLb(-1);
      }
      if (e.key === "ArrowRight") {
        e.preventDefault();
        navigateLb(1);
      }
    });

    function buildPhotoCard(p, index, globalIndex) {
      const fig = document.createElement("figure");
      fig.className = "card";
      fig.setAttribute("role", "listitem");
      fig.style.animationDelay = Math.min(index * 45, 600) + "ms";
      const src = dataUrlForPhoto(p);
      const ts = p.timestamp || "";
      const mime = p.mime_type || "image/jpeg";
      const locLine = formatLocation(p);

      const media = document.createElement("div");
      media.className = "card-media";

      const img = document.createElement("img");
      img.alt = "Photo " + (p.id || "");
      img.decoding = "async";
      img.loading = "lazy";
      if ("fetchPriority" in img) img.fetchPriority = index < 2 ? "high" : "low";
      img.src = src;
      img.addEventListener("click", () => openLightbox(globalIndex));

      const dlBtn = document.createElement("button");
      dlBtn.type = "button";
      dlBtn.className = "card-download";
      dlBtn.setAttribute("aria-label", "Download");
      dlBtn.innerHTML =
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';
      dlBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        downloadImage(src, ts, mime);
      });

      media.appendChild(img);
      media.appendChild(dlBtn);

      const cap = document.createElement("figcaption");
      cap.appendChild(document.createTextNode(formatTime(p.timestamp)));
      if (locLine) {
        const loc = document.createElement("span");
        loc.className = "loc";
        loc.textContent = locLine;
        cap.appendChild(loc);
      }

      fig.appendChild(media);
      fig.appendChild(cap);
      return fig;
    }

    function renderFolders(data) {
      foldersRoot.innerHTML = "";
      const folders = data.folders || [];
      galleryPhotosFlat = [];
      folders.forEach((f) => {
        (f.photos || []).forEach((p) => galleryPhotosFlat.push(p));
      });

      const total = folders.reduce(
        (s, f) => s + (f.count || (f.photos && f.photos.length) || 0),
        0
      );
      if (folders.length === 0 || total === 0) {
        statusEl.textContent = "No photos yet. Capture one from the home page.";
        foldersRoot.innerHTML =
          '<p class="empty">No images in storage.</p>';
        return;
      }

      statusEl.textContent =
        total === 1
          ? "1 photo"
          : total + " photos · " + folders.length + " days";

      let globalIdx = 0;
      folders.forEach((folder, fi) => {
        const photos = folder.photos || [];
        const label = folder.label || "";
        const count = folder.count != null ? folder.count : photos.length;

        const details = document.createElement("details");
        details.className = "folder-block";
        details.open = fi === 0;

        const summary = document.createElement("summary");
        const title = document.createElement("span");
        title.className = "folder-title";
        const dateSpan = document.createElement("span");
        dateSpan.className = "folder-date";
        dateSpan.textContent = label;
        title.appendChild(dateSpan);

        const badge = document.createElement("span");
        badge.className = "folder-count";
        badge.textContent = count === 1 ? "1 photo" : count + " photos";

        summary.appendChild(title);
        summary.appendChild(badge);

        const grid = document.createElement("div");
        grid.className = "folder-grid";
        grid.setAttribute("role", "list");

        let i = 0;
        photos.forEach((p) => {
          grid.appendChild(buildPhotoCard(p, i++, globalIdx++));
        });

        details.appendChild(summary);
        details.appendChild(grid);
        foldersRoot.appendChild(details);
      });
    }

    async function loadPhotos() {
      statusEl.textContent = "Loading photos…";
      statusEl.classList.remove("error");
      foldersRoot.innerHTML = "";

      let res;
      try {
        res = await fetch(`${API_BASE}/photos`, {
          cache: "default",
          headers: galleryHeaders(),
        });
      } catch (e) {
        statusEl.textContent = "Network error: " + (e.message || e);
        statusEl.classList.add("error");
        return;
      }

      if (res.status === 401) {
        authGate.classList.remove("hidden");
        galleryRoot.hidden = true;
        if (sessionStorage.getItem(STORAGE_KEY)) {
          authError.classList.add("visible");
        }
        authPassword.value = "";
        authPassword.focus();
        return;
      }

      const text = await res.text();
      let data;
      try {
        data = JSON.parse(text);
      } catch {
        statusEl.textContent = "Invalid response from API at " + API_BASE;
        statusEl.classList.add("error");
        return;
      }

      if (!res.ok) {
        statusEl.textContent =
          "Could not load photos: " + (data.detail || data.message || "HTTP " + res.status);
        statusEl.classList.add("error");
        return;
      }

      authGate.classList.add("hidden");
      galleryRoot.hidden = false;
      renderFolders(data);
    }

    async function bootstrap() {
      const saved = sessionStorage.getItem(STORAGE_KEY);
      if (saved) {
        await loadPhotos();
        return;
      }
      const probe = await fetch(`${API_BASE}/photos`, {
        cache: "default",
        headers: {},
      });
      if (probe.status === 401) {
        authGate.classList.remove("hidden");
        galleryRoot.hidden = true;
        authPassword.focus();
        return;
      }
      if (!probe.ok) {
        const t = await probe.text();
        let err;
        try {
          err = JSON.parse(t);
        } catch {
          err = {};
        }
        statusEl.textContent =
          "Could not load photos: " + (err.detail || t || probe.status);
        statusEl.classList.add("error");
        galleryRoot.hidden = false;
        return;
      }
      const data = await probe.json();
      authGate.classList.add("hidden");
      galleryRoot.hidden = false;
      renderFolders(data);
    }

    bootstrap();
  </script>
</body>
</html>
